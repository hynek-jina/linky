<!doctype html>
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="google" content="notranslate" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Linky</title>
  </head>
  <body>
    <div id="root">
      <div
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          background: #020617;
          color: #f9fbfc;
          font-family:
            system-ui,
            -apple-system,
            Segoe UI,
            Roboto,
            Helvetica,
            Arial,
            sans-serif;
        "
      >
        <div style="display: grid; place-items: center; gap: 16px">
          <img
            src="/icon-animated.svg"
            alt="Linky"
            width="220"
            height="220"
            style="display: block"
          />
          <div style="font-size: 14px; opacity: 0.85">Loading…</div>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const recoveryKey = "linky.boot.shell_recovery_at.v1";
        const defaultWatchdogMs = 18_000;
        const retryCooldownMs = 60_000;
        const configuredWatchdogMs = Number(
          Reflect.get(window, "__linkyBootWatchdogMs"),
        );
        const watchdogMs =
          Number.isFinite(configuredWatchdogMs) && configuredWatchdogMs > 0
            ? configuredWatchdogMs
            : defaultWatchdogMs;
        let appMounted = false;

        const readLastRecoveryAt = () => {
          try {
            const value = Number(sessionStorage.getItem(recoveryKey));
            return Number.isFinite(value) ? value : 0;
          } catch {
            return 0;
          }
        };

        const markRecoveryAttempt = () => {
          try {
            sessionStorage.setItem(recoveryKey, String(Date.now()));
          } catch {
            // A reload can still recover when sessionStorage is unavailable.
          }
        };

        const clearAppCaches = async () => {
          if ("serviceWorker" in navigator) {
            const registrations =
              await navigator.serviceWorker.getRegistrations();
            await Promise.all(
              registrations
                .filter(
                  (registration) =>
                    new URL(registration.scope).origin === location.origin,
                )
                .map((registration) => registration.unregister()),
            );
          }

          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(
              keys
                .filter(
                  (key) => key.includes("workbox") || key.includes("linky"),
                )
                .map((key) => caches.delete(key)),
            );
          }
        };

        const recoverAndReload = async () => {
          markRecoveryAttempt();
          await Promise.race([
            clearAppCaches().catch(() => undefined),
            new Promise((resolve) => window.setTimeout(resolve, 2_500)),
          ]);
          location.reload();
        };

        const renderBootFailure = () => {
          const root = document.getElementById("root");
          if (!root) return;

          const isCzech = navigator.language.toLowerCase().startsWith("cs");
          const panel = document.createElement("div");
          panel.style.cssText =
            "min-height:100vh;display:grid;place-items:center;padding:24px;background:#020617;color:#f9fbfc;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;text-align:center";

          const content = document.createElement("div");
          content.style.cssText =
            "display:grid;gap:14px;max-width:420px;justify-items:center";

          const title = document.createElement("h1");
          title.style.cssText = "font-size:20px;margin:0";
          title.textContent = isCzech
            ? "Aplikaci se nepodařilo spustit"
            : "The app failed to start";

          const description = document.createElement("p");
          description.style.cssText =
            "font-size:14px;line-height:1.5;opacity:.85;margin:0";
          description.textContent = isCzech
            ? "Načtení trvá příliš dlouho. Obnovené klíče zůstaly uložené."
            : "Loading is taking too long. Your restored keys remain saved.";

          const retry = document.createElement("button");
          retry.type = "button";
          retry.style.cssText =
            "border:0;border-radius:12px;padding:12px 18px;background:#14b8a6;color:#020617;font:inherit;font-weight:700;cursor:pointer";
          retry.textContent = isCzech
            ? "Vyčistit cache a načíst znovu"
            : "Clear cache and reload";
          retry.addEventListener("click", () => {
            retry.disabled = true;
            void recoverAndReload();
          });

          content.append(title, description, retry);
          panel.append(content);
          root.replaceChildren(panel);
        };

        const watchdog = window.setTimeout(() => {
          if (appMounted) return;

          const recoveryWasRecent =
            Date.now() - readLastRecoveryAt() < retryCooldownMs;
          if (navigator.onLine !== false && !recoveryWasRecent) {
            void recoverAndReload();
            return;
          }
          renderBootFailure();
        }, watchdogMs);

        window.addEventListener(
          "linky-app-mounted",
          () => {
            appMounted = true;
            window.clearTimeout(watchdog);
            try {
              sessionStorage.removeItem(recoveryKey);
            } catch {
              // ignore storage failures
            }
          },
          { once: true },
        );
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
