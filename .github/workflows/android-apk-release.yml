name: Android APK Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag / release name (for example v26.1.0)"
        required: true
        type: string

concurrency:
  group: android-apk-release-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release metadata
        env:
          REQUESTED_RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$REQUESTED_RELEASE_TAG"
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            workspace_version="$(bun -p 'require("./package.json").version')"
            release_tag="v${workspace_version}"
          fi

          if [[ -z "$release_tag" ]]; then
            echo "Missing release tag" >&2
            exit 1
          fi

          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "APK_PATH=apps/native-shell/android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_ENV"
          echo "APK_UPLOAD_PATH=$RUNNER_TEMP/linky.apk" >> "$GITHUB_ENV"

      - name: Restore Android Firebase config
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [[ -z "${ANDROID_GOOGLE_SERVICES_JSON_BASE64}" ]]; then
            echo "Missing ANDROID_GOOGLE_SERVICES_JSON_BASE64 secret" >&2
            exit 1
          fi

          echo "${ANDROID_GOOGLE_SERVICES_JSON_BASE64}" | base64 --decode > apps/native-shell/android/app/google-services.json

      - name: Restore Android signing key
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          if [[ -z "${ANDROID_UPLOAD_KEYSTORE_BASE64}" ]]; then
            echo "Missing ANDROID_UPLOAD_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi

          if [[ -z "${ANDROID_UPLOAD_STORE_PASSWORD}" || -z "${ANDROID_UPLOAD_KEY_ALIAS}" || -z "${ANDROID_UPLOAD_KEY_PASSWORD}" ]]; then
            echo "Missing Android signing password or alias secret" >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/linky-upload-key.jks"
          echo "${ANDROID_UPLOAD_KEYSTORE_BASE64}" | base64 --decode > "$keystore_path"

          cat > apps/native-shell/android/keystore.properties <<EOF
          storeFile=$keystore_path
          storePassword=${ANDROID_UPLOAD_STORE_PASSWORD}
          keyAlias=${ANDROID_UPLOAD_KEY_ALIAS}
          keyPassword=${ANDROID_UPLOAD_KEY_PASSWORD}
          EOF

      - name: Compute CI Android version code
        run: |
          echo "LINKY_ANDROID_VERSION_CODE=$((100000000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"

      - name: Run checks
        run: bun run check-code

      - name: Build Android release APK
        run: bun run native:apk:release

      - name: Prepare APK asset
        run: cp "$APK_PATH" "$APK_UPLOAD_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 1

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$APK_UPLOAD_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$APK_UPLOAD_PATH" \
              --title "Linky $RELEASE_TAG" \
              --notes "Signed Android APK release for Linky." \
              --target "$GITHUB_SHA"
          fi

  zapstore:
    name: Publish to Zapstore
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: zapstore
    permissions:
      contents: read
    env:
      ZSP_VERSION: 0.4.14
      ZSP_LINUX_AMD64_SHA256: f655a6c253a0aff6c6768dd24c65fb12aafe9cd2e48d35605e623adf54aaddb2

    steps:
      - name: Checkout Zapstore metadata
        uses: actions/checkout@v5

      - name: Download signed APK
        uses: actions/download-artifact@v8
        with:
          name: android-release-apk
          path: apps/native-shell/android/app/build/outputs/apk/release

      - name: Install verified Zapstore publisher
        run: |
          zsp_path="$RUNNER_TEMP/zsp"
          curl --fail --location --silent --show-error \
            --output "$zsp_path" \
            "https://github.com/zapstore/zsp/releases/download/v${ZSP_VERSION}/zsp-${ZSP_VERSION}-linux-amd64"
          echo "${ZSP_LINUX_AMD64_SHA256}  ${zsp_path}" | sha256sum --check --status
          chmod 700 "$zsp_path"

      - name: Publish signed APK to Zapstore
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SIGN_WITH: ${{ secrets.ZAPSTORE_NSEC }}
        run: |
          if [[ "${SIGN_WITH}" != nsec1* ]]; then
            echo "Missing or invalid ZAPSTORE_NSEC environment secret" >&2
            exit 1
          fi

          "$RUNNER_TEMP/zsp" publish zapstore.yaml \
            --quiet \
            --skip-preview \
            --commit "$GITHUB_SHA"
